<header class="header">
  <!-- Top Bar: Logo | Search | Icons -->
  <div class="header-top">
    <div class="container">
      <div class="header-top-inner">

        <!-- Logo -->
        <img src="src/assets/images/Logo.png"
          alt="A to Z Auto Parts"
          width="160" height="106" class="logo-img" />

        <!-- Search Bar -->
        <div class="search-bar">
          <input type="text" placeholder="Search the store" class="search-input" />
          <button class="search-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
        </div>

        <!-- Header Icons: Sign In | Wish Lists | Cart | Social -->
        <div class="header-icons">
          <a [routerLink]="['/login']" class="icon-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="icon-label"><small>Hello</small><br />Sign In</span>
          </a>

          <a [routerLink]="['/wishlist']" class="icon-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
              </path>
            </svg>
            <span class="icon-label">Wish<br />Lists</span>
          </a>

          <!-- <a [routerLink]="['/cart']" class="icon-link cart-link">
            <div class="cart-icon-wrap">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
              </svg>
              <span class="cart-count">{{ cartCount$ | async }}</span>
            </div>
            <span class="icon-label">Cart</span>
          </a> -->

          <!-- Social Icons -->
          <div class="social-icons">
            <a href="#" class="social-link" aria-label="Facebook">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
              </svg>
            </a>
            <a href="#" class="social-link" aria-label="Instagram">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
              </svg>
            </a>
            <a href="#" class="social-link" aria-label="Location">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
              </svg>
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Bottom Nav Bar: Category + Navigation Links -->
  <div class="header-nav">
    <div class="container">
      <div class="nav-inner">

        <!-- Category Dropdown Button -->
        <button class="category-btn" (click)="toggleMenu()">
          <span class="hamburger-icon">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
          </span>
          <span>Category</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>

        <!-- Navigation Links -->
        <nav class="nav-links" [class.active]="isMenuOpen">
          <a [routerLink]="['/home']" routerLinkActive="active" (click)="closeMenu()">Home</a>
          <a [routerLink]="['/about']" routerLinkActive="active" (click)="closeMenu()">About Us</a>
          <a [routerLink]="['/contact']" routerLinkActive="active" (click)="closeMenu()">Contact Us</a>
          <a [routerLink]="['/shop']" routerLinkActive="active" (click)="closeMenu()">Shop</a>
        </nav>

      </div>
    </div>
  </div>
</header>

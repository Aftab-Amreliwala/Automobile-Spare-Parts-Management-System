<div class="login-container">

  <div class="login-box">
    <h2>Admin Login</h2>

    <input 
      type="email" 
      placeholder="Email"
      [(ngModel)]="email"
    />

    <input 
      type="password" 
      placeholder="Password"
      [(ngModel)]="password"
    />

    <button (click)="login()" [disabled]="isLoading">
      {{ isLoading ? 'Logging in...' : 'Login' }}
    </button>

    <!-- <p>
      Don't have account? 
      <a routerLink="/register">Register</a>
    </p> -->

  </div>

</div>

<div class="add-product-page">

  <!-- Floating orbs background -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-icon">
      <span>📦</span>
    </div>
    <div class="page-header-text">
      <h2>Add Product</h2>
      <p>Fill in the details to add a new product to your inventory</p>
    </div>
  </div>

  <!-- Form Card -->
  <div class="form-card">

    <!-- Card Top Bar -->
    <div class="card-topbar">
      <span class="card-topbar-dot dot-red"></span>
      <span class="card-topbar-dot dot-yellow"></span>
      <span class="card-topbar-dot dot-green"></span>
      <span class="card-topbar-label">new_product.json</span>
    </div>

    <div class="form-body">

      <!-- Category -->
      <div class="field-group" style="animation-delay: 0.05s;">
        <label class="field-label">
          <span class="label-icon">📂</span> Category
        </label>
        <div class="input-wrap select-wrap">
          <select
            class="field-input field-select"
            [(ngModel)]="product.category"
            name="category">
            <option value="">Select a category</option>
            <option *ngFor="let c of categories" [value]="c.categoryName">
              {{ c.categoryName }}
            </option>
          </select>
          <span class="select-arrow">▾</span>
        </div>
      </div>

      <!-- Product Name -->
      <div class="field-group" style="animation-delay: 0.1s;">
        <label class="field-label">
          <span class="label-icon">✦</span> Product Name
        </label>
        <div class="input-wrap">
          <input
            type="text"
            class="field-input"
            [(ngModel)]="product.pname"
            name="pname"
            placeholder="e.g. Wireless Headphones"
          />
          <span class="input-focus-bar"></span>
        </div>
      </div>

      <!-- Description -->
      <div class="field-group" style="animation-delay: 0.15s;">
        <label class="field-label">
          <span class="label-icon">☰</span> Description
        </label>
        <div class="input-wrap">
          <textarea
            class="field-input field-textarea"
            rows="3"
            [(ngModel)]="product.pdesc"
            name="pdesc"
            placeholder="Describe the product..."
          ></textarea>
          <span class="input-focus-bar"></span>
        </div>
      </div>

      <!-- Price & Quantity -->
      <div class="field-row" style="animation-delay: 0.2s;">
        <div class="field-group field-half">
          <label class="field-label">
            <span class="label-icon">💲</span> Price
          </label>
          <div class="input-wrap price-wrap">
            <span class="input-prefix">₹</span>
            <input
              type="number"
              class="field-input has-prefix"
              [(ngModel)]="product.price"
              name="price"
              placeholder="0.00"
            />
            <span class="input-focus-bar"></span>
          </div>
        </div>

        <div class="field-group field-half">
          <label class="field-label">
            <span class="label-icon">#</span> Quantity
          </label>
          <div class="input-wrap">
            <input
              type="number"
              class="field-input"
              [(ngModel)]="product.qty"
              name="qty"
              placeholder="0"
            />
            <span class="input-focus-bar"></span>
          </div>
        </div>
      </div>


      <!-- Product Image -->
      <div class="field-group" style="animation-delay: 0.3s;">
        <label class="field-label">
          <span class="label-icon">⬆</span> Product Image
        </label>
        <label class="file-drop-zone">
          <div class="drop-inner">
            <div class="drop-icon">🖼</div>
            <p class="drop-text">Drag & drop or <span class="drop-browse">browse file</span></p>
            <p class="drop-hint">PNG, JPG, SVG — max 5MB</p>
          </div>
          <input type="file" (change)="onFile($event)" class="hidden-file" />
        </label>
      </div>

      <!-- Divider -->
      <div class="form-divider" style="animation-delay: 0.35s;"></div>

      <!-- Submit Button -->
      <div class="field-group" style="animation-delay: 0.4s;">
        <button class="submit-btn" (click)="save()">
          <span class="btn-icon">＋</span>
          <span class="btn-label">Save Product</span>
          <span class="btn-shine"></span>
        </button>
      </div>

    </div>
  </div>

</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap');

  :host {
    --accent: #f59e0b;
    --accent-glow: rgba(245, 158, 11, 0.15);
    --accent-glow-strong: rgba(245, 158, 11, 0.25);
    --main-bg: #f6f8fa;
    --text-primary: #1c2333;
    --text-muted: #6e7681;
    --border: #e5e9ef;
    --card-bg: #ffffff;
    --radius: 10px;
    --font-body: 'DM Sans', sans-serif;
    --font-display: 'Syne', sans-serif;
  }

  .add-product-page {
    min-height: 100%;
    font-family: var(--font-body);
    position: relative;
    overflow: hidden;
  }

  /* ── Orbs ── */
  .bg-orbs {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: float 8s ease-in-out infinite;
  }

  .orb-1 {
    width: 320px; height: 320px;
    background: radial-gradient(circle, #f59e0b, transparent 70%);
    top: -80px; right: 5%;
    opacity: 0.3;
    animation-delay: 0s;
  }

  .orb-2 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, #3b82f6, transparent 70%);
    bottom: 10%; left: -60px;
    opacity: 0.18;
    animation-delay: 3s;
  }

  .orb-3 {
    width: 140px; height: 140px;
    background: radial-gradient(circle, #f59e0b, transparent 70%);
    bottom: 30%; right: 12%;
    opacity: 0.15;
    animation-delay: 5s;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50%       { transform: translateY(-24px) scale(1.04); }
  }

  /* ── Page Header ── */
  .page-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    position: relative;
    z-index: 1;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .page-header-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, #1c2333, #0d1117);
    border: 1px solid #21262d;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12), 0 0 0 1px rgba(245,158,11,0.1);
    flex-shrink: 0;
  }

  .page-header h2 {
    margin: 0;
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  .page-header p {
    margin: 2px 0 0;
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ── Form Card ── */
  .form-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    max-width: 620px;
    position: relative;
    z-index: 1;
    animation: riseUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.05s both;
  }

  @keyframes riseUp {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Card Topbar ── */
  .card-topbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 18px;
    background: #f6f8fa;
    border-bottom: 1px solid var(--border);
  }

  .card-topbar-dot {
    width: 11px; height: 11px;
    border-radius: 50%;
  }

  .dot-red    { background: #f87171; }
  .dot-yellow { background: #fbbf24; }
  .dot-green  { background: #4ade80; }

  .card-topbar-label {
    font-size: 12px;
    color: #adb5bd;
    font-weight: 500;
    margin-left: 6px;
    font-family: 'Courier New', monospace;
  }

  /* ── Form Body ── */
  .form-body {
    padding: 28px 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Field Groups ── */
  .field-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeSlide 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Two-column row */
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    animation: fadeSlide 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .field-half {
    animation: none !important;
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    color: #484f58;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .label-icon {
    color: var(--accent);
    font-style: normal;
    font-size: 13px;
  }

  /* ── Inputs ── */
  .input-wrap {
    position: relative;
  }

  .field-input {
    width: 100%;
    padding: 11px 14px;
    background: #f6f8fa;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    box-sizing: border-box;
    transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    appearance: none;
    -webkit-appearance: none;
  }

  .field-input::placeholder {
    color: #adb5bd;
  }

  .field-input:focus {
    background: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .field-textarea {
    resize: vertical;
    min-height: 90px;
    line-height: 1.5;
  }

  /* Animated underline on focus */
  .input-focus-bar {
    position: absolute;
    bottom: 0; left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 2px;
    opacity: 0;
    transform: scaleX(0);
    transition: opacity 0.2s, transform 0.3s ease;
    pointer-events: none;
  }

  .field-input:focus ~ .input-focus-bar {
    opacity: 1;
    transform: scaleX(1);
  }

  /* ── Select ── */
  .select-wrap {
    position: relative;
  }

  .field-select {
    cursor: pointer;
    padding-right: 36px;
  }

  .select-arrow {
    position: absolute;
    right: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 14px;
    pointer-events: none;
  }

  /* ── Price prefix ── */
  .price-wrap {
    display: flex;
    align-items: center;
  }

  .input-prefix {
    position: absolute;
    left: 13px;
    color: var(--accent);
    font-weight: 600;
    font-size: 14px;
    pointer-events: none;
    z-index: 1;
  }

  .has-prefix {
    padding-left: 28px;
  }

  /* ── File Drop Zone ── */
  .file-drop-zone {
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 28px 20px;
    cursor: pointer;
    background: #fafbfc;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .file-drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-glow);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .file-drop-zone:hover {
    border-color: var(--accent);
    background: #fff;
    transform: translateY(-1px);
  }

  .file-drop-zone:hover::before {
    opacity: 1;
  }

  .hidden-file {
    display: none;
  }

  .drop-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    z-index: 1;
  }

  .drop-icon {
    font-size: 28px;
    animation: bobble 2.5s ease-in-out infinite;
  }

  @keyframes bobble {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-5px); }
  }

  .drop-text {
    margin: 0;
    font-size: 14px;
    color: var(--text-muted);
  }

  .drop-browse {
    color: var(--accent);
    font-weight: 600;
  }

  .drop-hint {
    margin: 0;
    font-size: 11.5px;
    color: #adb5bd;
  }

  /* ── Divider ── */
  .form-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    animation: fadeSlide 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* ── Submit Button ── */
  .submit-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 24px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: #0d1117;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
    box-shadow: 0 4px 14px var(--accent-glow-strong);
    width: 100%;
    justify-content: center;
    letter-spacing: 0.3px;
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px var(--accent-glow-strong);
  }

  .submit-btn:active {
    transform: translateY(0);
  }

  .btn-icon {
    font-size: 18px;
    font-family: var(--font-body);
    font-weight: 300;
    line-height: 1;
  }

  .btn-shine {
    position: absolute;
    top: 0; left: -60%;
    width: 40%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    transform: skewX(-20deg);
    animation: shine 3s ease-in-out infinite;
  }

  @keyframes shine {
    0%   { left: -60%; }
    50%  { left: 130%; }
    100% { left: 130%; }
  }
</style>
